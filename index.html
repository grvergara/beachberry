<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presidio Psy</title>
    <meta
      name="description"
      content="Presidio Psy: a mobile-first psychedelic 3D walk through Presidio Tunnel Tops."
    />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #06080d;
        color: #f7f8ff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #game-root {
        position: fixed;
        inset: 0;
        overflow: hidden;
      }

      #jam-widget-mount {
        position: fixed;
        right: 12px;
        bottom: 12px;
        z-index: 20;
        width: min(320px, calc(100vw - 24px));
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <main id="game-root" aria-label="Presidio Psy game root"></main>
    <aside id="jam-widget-mount" aria-label="Cursor Vibe Jam widget mount"></aside>
    <script type="module" src="/bootstrap.js"></script>
  </body>
</html>
